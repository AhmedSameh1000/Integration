<div class="container mt-4">
  <div class="d-flex justify-content-end mt-3">
    <button mat-raised-button color="primary">Add DataBase</button>
  </div>

  <div class="mycontainer">
    <div *ngFor="let db of DataBases" class="MyCard">
      <mat-card>
        <mat-card-header>
          <mat-card-title>{{ db.name }}</mat-card-title>
          <mat-card-subtitle>Type: {{ db.dataBaseType }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <p><strong>Database Type:</strong> {{ db.dataBaseType }}</p>
        </mat-card-content>
        <mat-card-actions>
          <button
            mat-raised-button
            #btn
            color="primary"
            (click)="checkConnection(db, Icon, btn)"
          >
            <i class="fa-solid fa-link" #Icon></i> Check Connection
          </button>
        </mat-card-actions>
      </mat-card>
    </div>
  </div>

  <div *ngIf="!DataBases?.length" class="mat-table-wrapper">
    <mat-card class="mat-message-card"> No databases available. </mat-card>
  </div>
</div>
